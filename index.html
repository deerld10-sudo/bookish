<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Reading Journal</title>
    <!-- Подключаем шрифт Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --tg-bg: #1A1A1C;
            --tg-sec-bg: #2A2A2C;
            --tg-text: #ffffff;
            --tg-hint: #8E8E93;
            --tg-accent: #8CD136; 
            --rating-red: #D34C4C;
            --rating-blue: #4C6CD3;
            --rating-green: #2ECB5B;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.3);
            --check-blue: #3a96ff;
            --border-radius-card: 12px;
            --border-radius-input: 8px;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-bg);
            color: var(--tg-text);
            margin: 0; padding: 0;
            min-height: 100vh; overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }

        /* Navigation */
        .top-nav {
            position: relative;
            background-color: var(--tg-bg); z-index: 100;
            padding: 16px 20px; display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-items-wrapper { 
            display: flex; gap: 8px; flex: 1; 
            overflow-x: auto; scrollbar-width: none; 
            padding-bottom: 4px;
        }
        .nav-items-wrapper::-webkit-scrollbar { display: none; }
        .nav-items-wrapper.hidden { display: none !important; }

        .nav-item {
            padding: 8px 18px; border-radius: 20px; font-size: 12px; font-weight: 600;
            white-space: nowrap; background-color: var(--tg-sec-bg); color: var(--tg-hint);
            transition: all 0.2s ease; cursor: pointer;
        }
        .nav-item.active { background-color: var(--tg-text); color: #000; font-weight: 600; }

        .btn-add-top { 
            background: none; border: none; cursor: pointer; 
            color: var(--tg-accent); font-size: 12px; font-weight: 600; 
            white-space: nowrap; padding: 4px 8px;
        }

        /* Выпадающее меню языков */
        .lang-dropdown-container { position: relative; display: flex; align-items: center; }
        .lang-dropdown-container.hidden { display: none !important; }
        
        #btn-lang-toggle {
            font-family: 'Montserrat', sans-serif;
            margin: 0; border: none;
            color: var(--tg-text);
        }
        .lang-menu {
            position: absolute; right: 0; top: calc(100% + 12px);
            background: var(--tg-sec-bg); border-radius: var(--border-radius-input);
            padding: 8px; display: flex; flex-direction: column; gap: 4px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.6); z-index: 2000;
            min-width: 80px; border: 1px solid rgba(255,255,255,0.05);
        }
        .lang-menu-item {
            padding: 10px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
            border-radius: 6px; transition: background 0.2s; text-align: center; color: var(--tg-text);
        }
        .lang-menu-item:hover { background: rgba(255,255,255,0.1); }

        /* Search Bar & Themes */
        .search-container {
            padding: 16px 20px 20px 20px;
            background: var(--tg-bg);
            display: flex; flex-direction: column; gap: 12px;
        }
        .search-input {
            width: 100%;
            background: var(--tg-sec-bg);
            border: none;
            border-radius: var(--border-radius-input);
            padding: 12px 16px;
            color: var(--tg-text);
            font-size: 14px;
        }
        .search-input::placeholder { color: var(--tg-hint); font-weight: 400; }

        .zk-themes-cloud { 
            display: flex; gap: 8px; overflow-x: auto; 
            scrollbar-width: none; 
            margin: 0 -20px; padding: 0 20px 4px 20px;
        }
        .zk-themes-cloud::-webkit-scrollbar { display: none; }
        .zk-theme-chip { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            padding: 6px 12px; border-radius: 16px; font-size: 12px; font-weight: 500;
            cursor: pointer; white-space: nowrap; color: var(--tg-text); transition: 0.2s;
        }
        .zk-theme-chip:hover { background: rgba(255,255,255,0.15); color: var(--tg-accent); border-color: var(--tg-accent); }

        #app { flex: 1; padding: 0 20px 20px 20px; }
        
        /* Точные отступы для всех вкладок */
        #tab-all, #tab-months, #tab-authors, #tab-tags, #tab-cards { padding-top: 4px; } 
        #tab-rating { padding-top: 0; } 
        #tab-add, #tab-view, #tab-goal, #tab-deferred { padding-top: 24px; } 

        .section { animation: fadeIn 0.3s ease-out; } 
        .hidden { display: none !important; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Grid Shelf */
        .book-shelf { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; 
            margin: 0 auto; 
        }
        @media (min-width: 500px) { .book-shelf { grid-template-columns: repeat(4, 1fr); gap: 16px; } }
        @media (min-width: 768px) { .book-shelf { grid-template-columns: repeat(5, 1fr); gap: 20px; } }
        @media (min-width: 1024px) { .book-shelf { grid-template-columns: repeat(6, 1fr); gap: 20px; } }

        .book-card { position: relative; cursor: pointer; transition: transform 0.2s ease; display: flex; flex-direction: column; }
        .book-card:active { transform: scale(0.97); }
        .book-cover { 
            width: 100%; aspect-ratio: 2/3; background-color: var(--tg-sec-bg); 
            border-radius: var(--border-radius-card); overflow: hidden; 
            position: relative; 
        }
        .book-cover img { width: 100%; height: 100%; object-fit: cover; }
        
        .add-card {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.05); color: var(--tg-hint);
        }
        .add-card .plus { font-size: 24px; font-weight: 300; margin-bottom: 8px; }
        .add-card .text { font-size: 12px; font-weight: 600; text-align: center; font-family: 'Montserrat', sans-serif; line-height: 1.3; }

        @media (max-width: 768px) {
            .add-card .text { font-size: 10px; }
        }
        
        .rating-badge { 
            position: absolute; top: -6px; right: -6px; font-size: 11px; font-weight: 700; 
            width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; color: #ffffff; z-index: 10;
        }
        .rating-red { background-color: var(--rating-red); }
        .rating-blue { background-color: var(--rating-blue); }
        .rating-green { background-color: var(--rating-green); }

        /* Deferred Card Icons */
        .deferred-actions {
            position: absolute; top: 6px; right: 6px; 
            display: flex; gap: 6px; z-index: 10;
        }
        .deferred-badge {
            width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; background: rgba(0,0,0,0.6); color: #fff;
        }
        .deferred-badge svg { width: 12px; height: 12px; fill: currentColor; }
        .deferred-badge:hover { background: rgba(0,0,0,0.8); }

        .group-title { 
            font-size: 16px; font-weight: 600; margin: 24px 0 16px 0; 
            display: flex; align-items: center; gap: 8px; 
            border-left: 3px solid var(--tg-accent); padding-left: 10px;
        }
        .group-title.flex-between { justify-content: space-between; }
        
        #shelf-months .group-title,
        #shelf-authors .group-title,
        #shelf-tags .group-title { margin-bottom: 24px; }

        #shelf-months > div:not(:first-child) .group-title,
        #shelf-authors > div:not(:first-child) .group-title,
        #shelf-tags > div:not(:first-child) .group-title { margin-top: 40px; }

        #shelf-months > div:first-child .group-title,
        #shelf-authors > div:first-child .group-title,
        #shelf-tags > div:first-child .group-title { margin-top: 0; }

        /* Goal Section */
        .goal-container { width: 100%; padding-bottom: 40px; }
        .goal-grid {
            display: grid; gap: 12px; margin-bottom: 30px;
            grid-template-columns: repeat(4, 1fr);
        }
        @media (min-width: 600px) { .goal-grid { grid-template-columns: repeat(8, 1fr); } }
        @media (min-width: 1024px) { .goal-grid { grid-template-columns: repeat(10, 1fr); } }

        .goal-slot {
            aspect-ratio: 4/5; background: var(--tg-sec-bg); border-radius: var(--border-radius-card);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: var(--tg-hint); position: relative; overflow: hidden;
        }
        .goal-slot.filled { cursor: pointer; }
        .goal-slot img { width: 100%; height: 100%; object-fit: cover; }
        
        .goal-footer { margin-top: 32px; text-align: center; }
        .goal-footer-main { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: #fff; font-family: 'Montserrat', sans-serif; }
        .goal-footer-sub { font-size: 12px; font-weight: 500; color: var(--tg-hint); }

        /* Rating Tab Styles */
        .rating-list-container { display: flex; flex-direction: column; gap: 12px; }
        .rating-list-item { 
            display: flex; background: var(--tg-sec-bg); 
            padding: 16px; border-radius: var(--border-radius-card); cursor: pointer;
            transition: transform 0.2s; align-items: center; gap: 20px; position: relative;
        }
        .rating-list-item:active { transform: scale(0.98); }
        .rating-list-img { width: 72px; aspect-ratio: 2/3; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
        .rating-list-content { flex: 1; display: flex; flex-direction: column; min-width: 0; padding-right: 40px; justify-content: center; }
        .rl-title { font-weight: 600; font-size: 16px; margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; line-height: 1.2; }
        .rl-author { font-size: 14px; color: var(--tg-text); margin-bottom: 12px; opacity: 0.9; line-height: 1.2; }
        .rl-meta { font-size: 12px; color: var(--tg-hint); line-height: 1.2; }
        .rl-score-box { 
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            display: flex; align-items: center; justify-content: center; 
            width: 32px; height: 32px; border-radius: 50%; color: #fff; font-weight: 700; font-size: 12px;
        }

        /* Form Styles */
        .add-form { display: flex; flex-direction: column; gap: 56px; padding-bottom: 100px; max-width: 700px; margin: 0 auto; }
        
        #note-only-fields {
            display: flex;
            flex-direction: column;
            gap: 56px;
        }
        #note-only-fields .group-title { margin-top: 0; }
        
        .form-header-row { 
            display: flex; gap: 20px; align-items: stretch;
        }
        @media (max-width: 500px) { .form-header-row { flex-direction: column; } }
        
        .cover-upload { 
            width: 180px; flex-shrink: 0; border-radius: var(--border-radius-card); 
            background: var(--tg-sec-bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; padding: 10px; color: var(--tg-hint); 
            cursor: pointer; overflow: hidden;
        }
        .cover-upload span { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 500; }
        @media (max-width: 500px) { .cover-upload { width: 140px; aspect-ratio: 2/3; margin: 0 auto; } }
        .cover-upload img { width: 100%; height: 100%; object-fit: cover; }
        
        .form-inputs { flex: 1; display: flex; flex-direction: column; gap: 12px; width: 100%; justify-content: space-between; }
        .form-inputs input { 
            background: var(--tg-sec-bg); border: none; border-radius: var(--border-radius-input); 
            padding: 14px 16px; color: var(--tg-text); font-size: 12px; font-weight: 600;
            font-family: 'Montserrat', sans-serif;
        }
        .form-inputs input::placeholder { color: var(--tg-hint); font-weight: 600; }
        
        .form-date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .custom-select-wrapper { position: relative; background: var(--tg-sec-bg); border-radius: var(--border-radius-input); }
        .custom-select-wrapper select { 
            width: 100%; background: transparent; border: none; padding: 14px 16px; 
            color: var(--tg-text); font-size: 12px; font-weight: 600; appearance: none; cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }
        .select-icon { 
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%); 
            pointer-events: none; width: 14px; height: 14px; opacity: 0.5;
        }

        .questions-cloud { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
        .q-chip { 
            padding: 10px 16px; background: var(--tg-sec-bg); border-radius: 20px; 
            font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.2s; 
            display: flex; align-items: center; gap: 6px;
        }
        .q-chip.selected { background: var(--tg-accent); color: #000; font-weight: 600; }

        /* Иконка плюсика для обычного состояния */
        .q-chip:not(.generate-btn)::before {
            content: '';
            display: block;
            width: 14px; height: 14px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cline x1='12' y1='5' x2='12' y2='19'%3E%3C/line%3E%3Cline x1='5' y1='12' x2='19' y2='12'%3E%3C/line%3E%3C/svg%3E");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Иконка галочки для выбранного состояния (черного цвета) */
        .q-chip.selected:not(.generate-btn)::before {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%23000000' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='20 6 9 17 4 12'%3E%3C/polyline%3E%3C/svg%3E");
        }

        /* Кастомный CSS-тултип */
        .q-chip[data-tooltip] {
            position: relative;
        }
        .q-chip[data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 4px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--tg-text);
            color: #000;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .q-chip[data-tooltip]:hover::after {
            opacity: 1;
            visibility: visible;
            bottom: calc(100% + 8px);
        }

        /* Стиль для кнопки генерации вопросов */
        .q-chip.generate-btn {
            background: rgba(140, 209, 54, 0.15);
            color: var(--tg-accent);
            border: 1px solid var(--tg-accent);
        }
        .q-chip.generate-btn:hover, .q-chip.generate-btn:active {
            background: var(--tg-accent);
            color: #000;
        }

        /* Стиль для неактивной кнопки генерации */
        .q-chip.generate-btn.disabled {
            background: transparent;
            color: var(--tg-hint);
            border: 1px dashed var(--tg-hint);
            cursor: default;
        }
        .q-chip.generate-btn.disabled:hover, .q-chip.generate-btn.disabled:active {
            background: transparent;
            color: var(--tg-hint);
        }

        /* Интерактивная кнопка добавления своего вопроса */
        #btn-add-custom-q {
            transition: all 0.3s ease;
        }
        #btn-add-custom-q.ready {
            background: var(--tg-accent);
            color: #000;
        }

        .custom-q-input-wrap { display: flex; flex-direction: column; gap: 8px; margin-bottom: 0; }
        .custom-q-input-wrap input { background: var(--tg-sec-bg); border: none; padding: 14px; border-radius: var(--border-radius-input); color: #fff; font-size: 13px;}
        
        #selected-questions { margin-top: 24px; }
        #selected-questions:empty { margin-top: 0; }

        .q-item { 
            background: var(--tg-sec-bg); border-radius: var(--border-radius-card); padding: 16px; 
            margin-bottom: 16px; position: relative; 
        }
        .q-item:last-child { margin-bottom: 0; }
        .q-item .q-header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .q-item label { display: block; font-size: 13px; font-weight: 500; color: var(--tg-hint); }
        .q-item textarea { 
            width: 100%; background: transparent; border: none; 
            border-left: 2px solid var(--tg-accent);
            padding: 4px 0 4px 12px; color: var(--tg-text); 
            font-size: 14px; resize: none; min-height: 60px; line-height: 1.5; font-weight: 500;
            overflow: hidden;
        }
        .delete-q-btn { 
            color: var(--tg-accent); width: 18px; height: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; opacity: 0.8;
        }
        .delete-q-btn svg { width: 100%; height: 100%; fill: currentColor; }

        /* Rating Sliders Improvements */
        .rating-row { margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        .rating-row:last-child { margin-bottom: 0; }
        .rating-label { font-size: 13px; font-weight: 500; color: var(--tg-hint); width: 220px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .rating-slider-container { flex: 1; display: flex; align-items: center; gap: 12px; position: relative; }
        .rating-slider { 
            width: 100%; -webkit-appearance: none; height: 4px; 
            background: rgba(255,255,255,0.1); border-radius: 2px; outline: none;
            background-image: linear-gradient(var(--tg-accent), var(--tg-accent));
            background-repeat: no-repeat;
        }
        .rating-slider::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 16px; height: 16px; 
            background: var(--tg-accent); border-radius: 50%; cursor: pointer;
        }
        .rating-val-display { font-size: 13px; font-weight: 600; width: 16px; text-align: right; }

        @media (max-width: 500px) {
            .rating-row { flex-direction: column; align-items: stretch; gap: 8px; margin-bottom: 24px;}
            .rating-row:last-child { margin-bottom: 0; }
            .rating-label { width: auto; display: flex; justify-content: space-between; white-space: normal; }
            .rating-val-display { display: none; }
        }

        /* Media */
        .media-section { margin-bottom: 40px; }
        .media-edit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; margin-top: 16px; }
        .media-edit-grid:empty { margin-top: 0; display: none; }
        .media-edit-item { aspect-ratio: 1; border-radius: var(--border-radius-input); overflow: hidden; position: relative; background: var(--tg-bg); }
        .media-edit-item img { width: 100%; height: 100%; object-fit: cover; }
        .media-del-btn {
            position: absolute; top: 4px; right: 4px; width: 20px; height: 20px;
            background: rgba(0,0,0,0.6); border-radius: 50%; color: #fff;
            display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer;
        }

        /* Buttons */
        .btn-full-width {
            width: 100%; padding: 14px; border-radius: var(--border-radius-input);
            font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; border: none;
            background: var(--tg-sec-bg); color: var(--tg-text); transition: 0.2s;
            font-family: 'Montserrat', sans-serif;
        }
        .btn-full-width.accent { background: var(--tg-accent); color: #fff; margin-top: 0; }
        .btn-full-width:active { opacity: 0.8; }

        .btn-mini-action { background: var(--tg-sec-bg); color: var(--tg-text); border-radius: var(--border-radius-input); width: 40px; height: 40px; padding: 0; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-mini-action.fill { background: var(--tg-accent); color: #000; }
        .btn-mini-action svg { width: 18px; height: 18px; fill: currentColor; }
        
        .icon-btn-settings { background: transparent; border: none; color: var(--tg-hint); cursor: pointer; display: flex; padding: 4px; }
        .icon-btn-settings svg { width: 24px; height: 24px; fill: currentColor; }

        /* View Mode */
        .view-note { max-width: 800px; margin: 0 auto; padding-bottom: 60px; }
        
        .view-header-flex { 
            display: flex; gap: 24px; align-items: stretch;
            margin-bottom: 40px; 
        }
        .view-cover-fixed { width: 160px; flex-shrink: 0; position: relative; }
        
        .view-info-column {
            display: flex; flex-direction: column; flex: 1; min-width: 0;
        }
        .view-text-info {
            display: flex; flex-direction: column; gap: 16px; 
        }
        .view-text-info h1 { font-size: 22px; margin: 0; font-weight: 700; line-height: 1.2; word-break: break-word; }
        .view-text-info h2 { font-size: 15px; color: var(--tg-text); margin: 0; font-weight: 600; line-height: 1.2; word-break: break-word; }
        .view-genre, .view-date { font-size: 13px; color: var(--tg-hint); line-height: 1.2; }
        
        .view-tags-container { display: flex; flex-wrap: wrap; gap: 8px; }
        .view-tag { font-size: 12px; background: var(--tg-sec-bg); padding: 6px 12px; border-radius: 16px; color: var(--tg-hint); font-weight: 500; }
        
        .view-actions-row { 
            display: flex; gap: 12px; 
            margin-top: auto; 
        }

        @media (max-width: 500px) {
            .view-header-flex { flex-direction: column; align-items: center; text-align: center; }
            .view-cover-fixed { width: 140px; }
            .view-text-info { gap: 12px; align-items: center; }
            .view-actions-row { margin-top: 24px; justify-content: center; }
        }

        .note-qa { margin-bottom: 40px; }

        .rating-badge-score { font-weight: 700; color: var(--tg-text); }

        .thought-card-q { font-size: 13px; color: var(--tg-hint); font-style: italic; }
        .thought-card-a { font-size: 14px; line-height: 1.6; color: var(--tg-text); font-weight: 400; white-space: pre-wrap; }

        .zk-link-badge { background: transparent; color: var(--tg-text); padding: 4px 8px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: monospace; transition: 0.2s; opacity: 0.8;}

        // --- ZETTELKASTEN LOGIC ---

        function extractZKKeywords(text) {
            // Используем юникод-свойства \p{L} (любая буква) и \p{N} (любая цифра), чтобы поддерживать испанские акценты и все языки
            const words = text.toLowerCase().replace(/[^\p{L}\p{N}]+/gu, ' ').split(/\s+/);
            // Возвращаем только слова длиннее 3 символов, которые не являются стоп-словами
            return [...new Set(words.filter(w => w.length > 3 && !ZK_STOP_WORDS.has(w)))];
        }

        function renderCardsTab(allBooks, query) {
            const container = document.getElementById('cards-list');
            const themesContainer = document.getElementById('zk-themes-container');
            container.innerHTML = '';
            
            let zettelCards = [];
            let cardIndex = 1;
            let globalWordCounts = {};

            // 1. Сортируем книги строго хронологически (от старых к новым) 
            // для того, чтобы номера карточек присваивались навсегда и не сбивались
            const getBookTime = (id) => isNaN(parseInt(id)) ? 0 : parseInt(id);
            const sortedBooksChrono = [...allBooks].sort((a, b) => getBookTime(a.id) - getBookTime(b.id));

            // Фаза 1: Сбор всех карточек и анализ частотности слов
            sortedBooksChrono.forEach(book => {
                if(book.answers) {
                    Object.entries(book.answers).forEach(([qKey, answer]) => {
                        const ansTrimmed = answer.trim();
                        if(ansTrimmed.length > 20) {
                            const localizedQ = getLocalizedQuestion(qKey);
                            const keywords = extractZKKeywords(ansTrimmed + " " + localizedQ);
                            
                            // Считаем популярность слов для формирования облака тем
                            keywords.forEach(kw => {
                                globalWordCounts[kw] = (globalWordCounts[kw] || 0) + 1;
                            });

                            zettelCards.push({
                                numId: String(cardIndex).padStart(5, '0'),
                                bookId: book.id,
                                qLocal: localizedQ,
                                answer: ansTrimmed,
                                title: book.title,
                                author: book.author,
                                keywords: keywords
                            });
                            cardIndex++;
                        }
                    });
                }
            });

            // Формируем облако тем (Топ 15 слов, встречающихся больше 1 раза)
            const topThemes = Object.entries(globalWordCounts)
                .filter(entry => entry[1] > 1) // Слово должно быть минимум в 2 карточках
                .sort((a,b) => b[1] - a[1]) // Сортируем по популярности
                .slice(0, 15)
                .map(e => e[0]);

            themesContainer.innerHTML = topThemes.map(theme => 
                `<div class="zk-theme-chip" onclick="window.setSearchQuery('${theme}')">#${theme}</div>`
            ).join('');

            if(zettelCards.length === 0) {
                container.innerHTML = `<p style="text-align:center; color: var(--tg-hint); margin-top: 40px;">${t('noCards')}</p>`;
                return;
            }

            // Фаза 2: Поиск связей (линковка)
            zettelCards.forEach(c1 => {
                c1.related = [];
                zettelCards.forEach(c2 => {
                    if (c1.numId === c2.numId) return;
                    // Находим общие значимые слова
                    const common = c1.keywords.filter(k => c2.keywords.includes(k));
                    if (common.length >= 2) { // Связываем, если есть хотя бы 2 общих ключевых слова
                        c1.related.push({ numId: c2.numId, count: common.length, shared: common });
                    }
                });
                // Сортируем связи по силе (количеству общих слов) и берем топ-3
                c1.related.sort((a,b) => b.count - a.count);
                c1.related = c1.related.slice(0, 3);
            });

            // 2. Переворачиваем готовый массив карточек. 
            // Теперь самые свежие (с самыми большими порядковыми номерами) будут отображаться сверху!
            zettelCards.reverse();

            // Фаза 3: Отрисовка
            zettelCards.forEach(card => {
                // Если есть поисковой запрос, фильтруем
                if (query) {
                    const qLower = query.toLowerCase();
                    if (!card.answer.toLowerCase().includes(qLower) && !card.qLocal.toLowerCase().includes(qLower)) {
                        return; // Пропускаем
                    }
                }

                const domCard = document.createElement('div');
                domCard.className = 'thought-card';
                domCard.id = 'card-' + card.numId;

                // Если есть поисковой запрос, подсветим его
                let htmlAnswer = card.answer.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                if (query && query.length > 2) {
                    const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                    htmlAnswer = htmlAnswer.replace(regex, '<span class="zk-highlight">$1</span>');
                }

                // Рендер связей (Autonomous Links)
                let linksHtml = '';
                if (card.related.length > 0) {
                    linksHtml = `
                        <div class="zk-smart-links">
                            <span class="zk-smart-links-title">
                                <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                                Связанные мысли:
                            </span>
                            ${card.related.map(r => `<span class="zk-link-badge" title="Общее: ${r.shared.join(', ')}" onclick="window.scrollToCard('${r.numId}')">#${r.numId}</span>`).join('')}
                        </div>
                    `;
                }

                domCard.innerHTML = `
                    <div class="thought-card-header">
                        <span class="thought-card-num">#${card.numId}</span>
                        <div class="thought-card-arrow" onclick="window.viewBook('${card.bookId}')" title="Перейти к книге">
                            <svg viewBox="0 0 24 24"><polyline points="15 14 20 9 15 4"></polyline><path d="M4 20v-7a4 4 0 0 1 4-4h12"></path></svg>
                        </div>
                    </div>
                    <div class="thought-card-content">
                        <span class="thought-card-q">${card.qLocal}</span>
                        <span class="thought-card-a">«${htmlAnswer}»</span>
                    </div>
                    ${linksHtml}
                    <div class="thought-card-footer">
                        <span class="thought-card-title">"${card.title}"</span>
                        <span class="thought-card-author">${card.author}</span>
                    </div>
                `;
                container.appendChild(domCard);
            });
        }

        // Вспомогательная функция, которая считает, сколько вопросов осталось для введенного жанра
        function getAvailableQuestionsForCurrentGenre() {
            const genreEl = document.getElementById('f-genre');
            const genreStr = genreEl ? genreEl.value.toLowerCase().trim() : '';
            let matchedCategory = 'default';
            
            for (const [cat, keywords] of Object.entries(genreKeywords)) {
                if (keywords.some(kw => genreStr.includes(kw))) {
                    matchedCategory = cat;
                    break;
                }
            }
            
            const pool = genreToQuestions[matchedCategory] || genreToQuestions['default'];
            return pool.filter(k => !currentExtraQKeys.includes(k));
        }

        function renderQuestionsCloud() {
            const container = document.getElementById('q-cloud');
            let cloudKeys = [...universalQuestions, ...currentExtraQKeys];
            
            // Проверяем уже выбранные вопросы, чтобы они не пропали из облака
            document.querySelectorAll('.q-item').forEach(item => {
                if (item.id.startsWith('q-')) {
                    const k = item.id.substring(2);
                    if (!cloudKeys.includes(k)) cloudKeys.push(k);
                }
            });

            const available = getAvailableQuestionsForCurrentGenre();
            const isExhausted = available.length === 0;

            container.innerHTML = cloudKeys.map(k => {
                const active = !!document.getElementById('q-' + k);
                return `<div class="q-chip ${active ? 'selected' : ''}" id="chip-${k}" data-tooltip="${active ? t('tooltipRemoveQ') : t('tooltipAddQ')}" onclick="window.toggleDynamicQuestion(this, '${k}')">${t(k)}</div>`;
            }).join('') + `<div class="q-chip generate-btn ${isExhausted ? 'disabled' : ''}" ${isExhausted ? '' : 'onclick="window.generateGenreQuestions()"'}><span style="font-size:16px; margin-top:-2px; ${isExhausted ? 'opacity: 0.5;' : ''}">🎲</span> ${t('btnGenerateQ')}</div>`;
        }

        window.generateGenreQuestions = () => {
            const available = getAvailableQuestionsForCurrentGenre();
            if (available.length === 0) return; // Защита от кликов, если вопросы закончились

            // Берём следующие 5 вопросов по порядку (БЕЗ РАНДОМА)
            const toAdd = available.slice(0, 5);
            
            toAdd.forEach(k => currentExtraQKeys.push(k));
            
            renderQuestionsCloud();
            if (window.Telegram?.WebApp?.HapticFeedback) Telegram.WebApp.HapticFeedback.selectionChanged();
        };

        window.openAddForm = (bookId = null, prefillData = null) => {
            document.getElementById('cover-input').value = ''; 
            currentEditingId = bookId; isDeferredMode = false; window.switchTab('add');
            document.getElementById('note-only-fields').classList.remove('hidden');
            document.getElementById('note-date-row').classList.remove('hidden');

            const monthSel = document.getElementById('f-month');
            monthSel.innerHTML = translations[currentLang].months.map((m, i) => `<option value="${translations['ru'].months[i]}">${m}</option>`).join('');

            const yearSel = document.getElementById('f-year');
            if (yearSel.options.length === 0) { const cur = new Date().getFullYear(); for(let i=cur+2; i>=2000; i--) yearSel.add(new Option(i, i)); yearSel.value = cur; }
            
            const book = prefillData || (bookId ? books.find(b => b.id === bookId) : null);
            document.getElementById('f-title').value = book?.title || '';
            document.getElementById('f-author').value = book?.author || '';
            document.getElementById('f-genre').value = book?.genre || '';
            document.getElementById('f-tags').value = (book?.tags || []).join(', ');
            document.getElementById('selected-questions').innerHTML = '';
            currentExtraQKeys = []; // Сбрасываем сгенерированные вопросы
            
            selectedCoverBase64 = book?.img || null;
            document.getElementById('cover-preview-container').innerHTML = selectedCoverBase64 ? `<img src="${selectedCoverBase64}">` : `<span style="font-size: 24px; margin-bottom: 8px; font-weight: 300;">+</span><span>${t('addCover')}</span>`;
            
            currentMediaFiles = book?.media || [];
            renderMediaEditList();
            
            // Восстанавливаем ответы
            if (book && !prefillData) { 
                monthSel.value = book.month; 
                document.getElementById('f-year').value = book.year; 
                if (book.answers) {
                    Object.entries(book.answers).forEach(([ruKey, a]) => {

        window.setLanguage = (langCode) => {
            currentLang = langCode;
            localStorage.setItem('reading_journal_lang', currentLang);
            applyTranslations();
            
            document.getElementById('btn-lang-toggle').innerText = langDisplayMap[currentLang];
            document.getElementById('lang-menu').classList.add('hidden');
            
            const monthSelect = document.getElementById('f-month');
            const prevMonthVal = monthSelect.value;
            monthSelect.innerHTML = translations[currentLang].months.map((m, i) => `<option value="${translations['ru'].months[i]}">${m}</option>`).join('');
            if(prevMonthVal) monthSelect.value = prevMonthVal;
            
            const isAddOpen = !document.getElementById('tab-add').classList.contains('hidden');
            const isViewOpen = !document.getElementById('tab-view').classList.contains('hidden');
            
            if (isAddOpen) {
                renderQuestionsCloud();
                
                document.querySelectorAll('.q-item').forEach(item => {
                    const label = item.querySelector('label');
                    const storageKey = label.getAttribute('data-storage-key');
                    const key = getKeyByRuString(storageKey);
                    if (key) label.innerText = t(key);
                });
                
                document.querySelectorAll('.rating-row .rating-label').forEach((el, i) => {
                    el.innerText = translations[currentLang].criteria[i];
                });
                
                if (selectedCoverBase64) {
                    document.getElementById('cover-preview-container').innerHTML = `<img src="${selectedCoverBase64}">`;
                } else {
                    document.getElementById('cover-preview-container').innerHTML = `<span style="font-size: 24px; margin-bottom: 8px; font-weight: 300;">+</span><span>${t('addCover')}</span>`;
                }
                document.getElementById('btn-save-main').innerText = isDeferredMode ? t('btnPlanBook') : t('btnSaveNotes');
            } else if (isViewOpen && currentViewingId) {
                if (isDeferredMode) window.viewDeferredBook(currentViewingId);
                else window.viewBook(currentViewingId);
            } else {
                window.renderCurrentTab();
            }
        };

        window.onload = () => {
            applyTranslations();
            document.getElementById('btn-lang-toggle').innerText = langDisplayMap[currentLang] || 'RUS';
            
            loadInitialDataIfEmpty();
            const saved = localStorage.getItem('reading_journal_v2'); 
            if (saved) books = JSON.parse(saved);
            const savedDef = localStorage.getItem('reading_journal_deferred'); if (savedDef) deferredBooks = JSON.parse(savedDef);
            const savedGoal = localStorage.getItem('reading_goal_v2'); if (savedGoal) currentYearGoal = parseInt(savedGoal);
            
            const monthSelect = document.getElementById('f-month');
            monthSelect.innerHTML = translations[currentLang].months.map((m, i) => `<option value="${translations['ru'].months[i]}">${m}</option>`).join('');

            window.switchTab('all'); Telegram.WebApp.ready(); Telegram.WebApp.expand();
        };
    </script>
</body>
</html>
